name: Publish Fluxy

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        required: true
        default: testpypi
        type: choice
        options:
          - testpypi
          - pypi

permissions:
  contents: read

jobs:
  build:
    name: Test and build distributions
    runs-on: ubuntu-latest
    if: github.event_name != 'release' || startsWith(github.event.release.tag_name, 'python-v')
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Validate Python release tag
        if: github.event_name == 'release' || inputs.target == 'pypi'
        run: |
          test "$GITHUB_REF_TYPE" = "tag"
          test "$GITHUB_REF_NAME" = "python-v$(uv version --short)"

      - name: Run non-integration tests
        run: uv run pytest -m "not integration"

      - name: Run Ruff
        run: uv run ruff check src tests

      - name: Run ty
        run: uv run ty check src/fluxy

      - name: Build wheel and source distribution
        run: uv build

      - name: Verify MIT distribution boundary
        run: uv run python scripts/verify_python_distribution.py

      - name: Validate distributions
        run: uvx twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: fluxy-distributions
          path: dist/*
          if-no-files-found: error

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi'
    environment: testpypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: fluxy-distributions
          path: dist

      - name: Publish to TestPyPI with trusted publishing
        run: uv publish --publish-url https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: fluxy-distributions
          path: dist

      - name: Publish to PyPI with trusted publishing
        run: uv publish
