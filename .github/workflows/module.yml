name: Verify Fluxy Gateway Module

on:
  pull_request:
    paths:
      - "ignition-module/**"
      - ".github/workflows/module.yml"
  push:
    branches: [main]
    paths:
      - "ignition-module/**"
      - ".github/workflows/module.yml"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ignition-target: ["8.1", "8.3"]
        license-mode: ["licensed", "free"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - name: Test and package unsigned development module
        working-directory: ignition-module
        run: ./gradlew -PignitionTarget=${{ matrix.ignition-target }} -PlicenseMode=${{ matrix.license-mode }} clean test packageDevelopment
      - uses: astral-sh/setup-uv@v5
      - name: Lint module integration test
        run: uv run ruff check ignition-module/tests
